<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChitChat 💌</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>💌 ChitChat</h1>

<p>Private chat for two</p>

<!-- LOGIN BOX -->
<input id="name" type="text" placeholder="Enter your name" autocomplete="off">
<input id="invite" type="password" placeholder="Invite code" autocomplete="off">

<button onclick="enterChat()">Join Chat</button>

<!-- OPTIONAL ERROR MESSAGE -->
<p id="error" style="color:red;"></p>

</div>

<script src="script.js"></script>

</body>
</html>
